name: Build & Release KHPBot

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "KHPBot" `
            --icon "icon.ico" `
            --add-data "states;states" `
            --add-data "features;features" `
            app.py

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          name: "KHPBot ${{ github.ref_name }}"
          body: |
            ## KHPBot ${{ github.ref_name }}

            ### Installation
            1. Download `KHPBot.exe` below
            2. Run `KHPBot.exe`

            ### What's changed
            _Add your release notes here or use the auto-generate button on GitHub._
          files: dist/KHPBot.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
